
services:
  db:
    image: postgres:16
    container_name: sentry-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sentry}
      SKIP_SEED: "true"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentry}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: sentry-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FLASK_ENV: production
      FLASK_PORT: 5000
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: sentry-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery-worker:
    build: ./api
    container_name: sentry-celery
    command: celery -A jobs worker --loglevel=info
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SENTRY_ENCRYPTION_KEY: ${SENTRY_ENCRYPTION_KEY:?Set SENTRY_ENCRYPTION_KEY in .env}

  admin:
    build: ./admin
    container_name: sentry-admin
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
