
services:
  db:
    image: postgres:16
    container_name: sentry-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sentry}
      SKIP_SEED: "true"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentry}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: sentry-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FLASK_ENV: production
      FLASK_PORT: 5000
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  admin:
    build: ./admin
    container_name: sentry-admin
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
