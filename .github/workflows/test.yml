name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentry
          POSTGRES_PASSWORD: sentry
          POSTGRES_DB: sentry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        # v1.6.0 D3 #175: the wake orchestrator's Redis pubsub
        # subscriber tests need a live broker. CI runs an
        # ephemeral, passwordless Redis instance; the local dev
        # stack uses REDIS_PASSWORD via docker-compose.yml. Both
        # paths exercise the same code; only the URL differs.
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: v1.6.0 lint -- single-serialization (no json.dumps in signing.py or dispatch.py)
        # #174 (D2) + #179 (D7): the dispatcher's envelope
        # sign-and-send path must serialize the envelope to
        # bytes EXACTLY ONCE per delivery and reuse the same
        # bytes for sign + send (plan §3.1 single-serialization
        # invariant). Two json.dumps calls along that path
        # would mean the bytes that were signed are not the
        # bytes sent on the wire (or vice versa), and the
        # consumer's HMAC verification breaks silently.
        #
        # Scope: signing.py + dispatch.py are the envelope
        # sign-and-send code path. envelope.py is the canonical
        # serializer (one json.dumps allowed). wake.py owns
        # cross-worker pubsub plumbing (publish_subscription_event
        # uses json.dumps for a small dict that is NOT the
        # envelope; allowed).
        #
        # The lint forbids json.dumps in signing.py and
        # dispatch.py specifically. A future contributor who
        # tries to inline a "quick json.dumps" instead of using
        # envelope.serialize_envelope hits this gate.
        # Also catches json.dump (file-handle API) anywhere in
        # the package, which would bypass the json.dumps
        # pattern silently.
        run: |
          forbidden=$(grep -rn --include="*.py" "json\.dumps(" \
            api/services/webhook_dispatcher/signing.py \
            api/services/webhook_dispatcher/dispatch.py \
            2>/dev/null | wc -l | tr -d ' ')
          if [ "$forbidden" -gt 0 ]; then
            echo ""
            echo "ERROR: json.dumps( in signing.py or dispatch.py"
            echo "These files must consume envelope.serialize_envelope, not"
            echo "call json.dumps directly. The envelope sign-and-send path"
            echo "must produce one bytes object per delivery and reuse it."
            grep -rn --include="*.py" "json\.dumps(" \
              api/services/webhook_dispatcher/signing.py \
              api/services/webhook_dispatcher/dispatch.py
            exit 1
          fi
          dump_count=$(grep -rn --include="*.py" "json\.dump(" api/services/webhook_dispatcher/ | wc -l | tr -d ' ')
          if [ "$dump_count" -gt 0 ]; then
            echo ""
            echo "ERROR: json.dump( (file-handle API) in api/services/webhook_dispatcher/"
            grep -rn --include="*.py" "json\.dump(" api/services/webhook_dispatcher/
            exit 1
          fi
          echo "OK: 0 json.dumps( in signing.py or dispatch.py; 0 json.dump( in package"

      - name: v1.6.0 lint -- no verify=False in webhook_dispatcher
        # #173 (D1): the dispatcher MUST always send with TLS
        # verification on. A regression that introduced verify=False
        # would silently disable cert checking on every webhook POST
        # and the dispatch-time SSRF guard would not catch it
        # (SSRF guards address private-range targets, not cert
        # spoofing). The lint scans the whole package; an
        # intentional verify=False anywhere under
        # api/services/webhook_dispatcher/ fails CI.
        run: |
          if grep -rn "verify\s*=\s*False" api/services/webhook_dispatcher/; then
            echo ""
            echo "ERROR: verify=False found in api/services/webhook_dispatcher/"
            echo "The dispatcher MUST always send with TLS verification on."
            echo "Plan §2.1 + §4.1: requests.Session.verify stays True"
            echo "regardless of SENTRY_ALLOW_HTTP_WEBHOOKS."
            exit 1
          fi
          echo "OK: no verify=False in api/services/webhook_dispatcher/"

      - name: Validate v1.5.0 event schemas
        # #111: importing the registry forces Draft 2020-12 validation
        # of every api/schemas_v1/events/*/*.json file and asserts
        # V150_CATALOG has a matching schema for each (event_type,
        # version). A malformed schema or missing catalog entry raises
        # RuntimeError with the offending path, so failure output is
        # self-explanatory.
        run: |
          cd api && python -c "from services import events_schema_registry as r; print(f'OK: {len(r.V150_CATALOG)} v1.5.0 schemas validated')"

      - name: Load database schema
        env:
          PGPASSWORD: sentry
        run: psql -h localhost -U sentry -d sentry -f db/schema.sql

      - name: Load seed data
        env:
          PGPASSWORD: sentry
        run: psql -h localhost -U sentry -d sentry -f db/seed-apartment-lab.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://sentry:sentry@localhost:5432/sentry
          JWT_SECRET: test-secret
          # v1.6.0 D3 #175: wake.WakeOrchestrator pubsub tests
          # need REDIS_URL pointing at the service container above.
          # Passwordless URL because the CI Redis service does not
          # set requirepass (matches the redis:7-alpine default).
          REDIS_URL: redis://localhost:6379/0
        run: cd api && python -m pytest tests/ -v
