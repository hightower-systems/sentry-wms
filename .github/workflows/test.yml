name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentry
          POSTGRES_PASSWORD: sentry
          POSTGRES_DB: sentry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: v1.6.0 lint -- single-serialization (no double json.dumps in webhook_dispatcher)
        # #174 (D2): the dispatcher's signing/dispatch path must
        # serialize the envelope to bytes EXACTLY ONCE per
        # delivery and reuse the same bytes for sign + send (plan
        # §3.1 single-serialization invariant). Two json.dumps
        # calls in the dispatcher path means the bytes that were
        # signed are not the bytes sent on the wire (or vice
        # versa), and the consumer's HMAC verification breaks
        # silently. The lint counts OCCURRENCES (line matches),
        # not files, so two json.dumps calls in the same file
        # still fail. envelope.py is the only allowed home.
        # Also catches json.dump (file-handle API), which would
        # bypass the json.dumps pattern silently.
        run: |
          # Match actual call sites only -- ``json.dumps(`` with
          # an open paren -- so docstring back-tick references
          # like ``\`\`json.dumps\`\``` don't false-positive. Same
          # tightening for json.dump( (file-handle API).
          #
          # Scope note: this lint catches the standard library
          # serializers only. A future contributor that introduces
          # orjson, ujson, or a custom JSONEncoder.encode call
          # would bypass this guard. The plan §3.1 invariant
          # remains "serialize to bytes EXACTLY ONCE per delivery";
          # if the dispatcher ever depends on a non-stdlib
          # serializer, extend this lint at that time.
          dumps_count=$(grep -rn --include="*.py" "json\.dumps(" api/services/webhook_dispatcher/ | wc -l | tr -d ' ')
          dump_count=$(grep -rn --include="*.py" "json\.dump(" api/services/webhook_dispatcher/ | wc -l | tr -d ' ')
          if [ "$dumps_count" -gt 1 ] || [ "$dump_count" -gt 0 ]; then
            echo ""
            echo "ERROR: more than one json serialization call in api/services/webhook_dispatcher/"
            echo "json.dumps( occurrences (allowed: 1, the canonical envelope serializer):"
            grep -rn --include="*.py" "json\.dumps(" api/services/webhook_dispatcher/
            echo ""
            echo "json.dump( (file-handle) occurrences (allowed: 0):"
            grep -rn --include="*.py" "json\.dump(" api/services/webhook_dispatcher/ || true
            echo ""
            echo "Plan §3.1 single-serialization invariant: the envelope"
            echo "must be serialized to bytes EXACTLY once per delivery"
            echo "and reused unchanged for sign + send. envelope.py is"
            echo "the only home for json.dumps in this package."
            exit 1
          fi
          echo "OK: 1 json.dumps( call (canonical envelope serializer), 0 json.dump( calls"

      - name: v1.6.0 lint -- no verify=False in webhook_dispatcher
        # #173 (D1): the dispatcher MUST always send with TLS
        # verification on. A regression that introduced verify=False
        # would silently disable cert checking on every webhook POST
        # and the dispatch-time SSRF guard would not catch it
        # (SSRF guards address private-range targets, not cert
        # spoofing). The lint scans the whole package; an
        # intentional verify=False anywhere under
        # api/services/webhook_dispatcher/ fails CI.
        run: |
          if grep -rn "verify\s*=\s*False" api/services/webhook_dispatcher/; then
            echo ""
            echo "ERROR: verify=False found in api/services/webhook_dispatcher/"
            echo "The dispatcher MUST always send with TLS verification on."
            echo "Plan §2.1 + §4.1: requests.Session.verify stays True"
            echo "regardless of SENTRY_ALLOW_HTTP_WEBHOOKS."
            exit 1
          fi
          echo "OK: no verify=False in api/services/webhook_dispatcher/"

      - name: Validate v1.5.0 event schemas
        # #111: importing the registry forces Draft 2020-12 validation
        # of every api/schemas_v1/events/*/*.json file and asserts
        # V150_CATALOG has a matching schema for each (event_type,
        # version). A malformed schema or missing catalog entry raises
        # RuntimeError with the offending path, so failure output is
        # self-explanatory.
        run: |
          cd api && python -c "from services import events_schema_registry as r; print(f'OK: {len(r.V150_CATALOG)} v1.5.0 schemas validated')"

      - name: Load database schema
        env:
          PGPASSWORD: sentry
        run: psql -h localhost -U sentry -d sentry -f db/schema.sql

      - name: Load seed data
        env:
          PGPASSWORD: sentry
        run: psql -h localhost -U sentry -d sentry -f db/seed-apartment-lab.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://sentry:sentry@localhost:5432/sentry
          JWT_SECRET: test-secret
        run: cd api && python -m pytest tests/ -v
