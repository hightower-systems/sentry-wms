# Nginx server block for the Sentry WMS admin SPA.
# Serves built static assets and proxies /api requests to the Flask API
# so the browser sees a single same-origin surface (no CORS needed for
# admin-origin calls).

server {
    listen 8080;
    server_name _;

    # Root for the built React bundle
    root /usr/share/nginx/html;
    index index.html;

    # Conservative security headers. CSP intentionally omitted here; it
    # is set server-side by the Flask API for /api responses, and will
    # be added here when V-050 is addressed in v1.4.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Block any attempt to reach Vite dev-server paths that legacy
    # scanners may probe (defensive; nginx does not serve these at all).
    location ~ ^/(@fs|@id|@vite|__vite_hmr|__vite_ping) {
        return 404;
    }

    # Proxy API traffic to the Flask container. This keeps the admin
    # origin (http://host:8080) and API origin unified, sidestepping
    # CORS for admin-initiated requests.
    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback. Serves index.html for any non-file path so the React
    # router can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
