
services:
  db:
    image: postgres:16
    container_name: sentry-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentry}
      POSTGRES_DB: ${POSTGRES_DB:-sentry}
      SKIP_SEED: ${SKIP_SEED:-false}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed-apartment-lab.sql:/seed-data/seed-apartment-lab.sql
      - ./db/seed.sh:/docker-entrypoint-initdb.d/02-seed.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: sentry-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env -- see .env.example}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_PORT: 5000
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5000,http://localhost:8081"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./db:/db

  redis:
    image: redis:7-alpine
    container_name: sentry-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery-worker:
    build: ./api
    container_name: sentry-celery
    command: celery -A jobs worker --loglevel=info
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env -- see .env.example}
      SENTRY_ENCRYPTION_KEY: ${SENTRY_ENCRYPTION_KEY:-}
    volumes:
      - ./api:/app
      - ./db:/db

  admin:
    build: ./admin
    container_name: sentry-admin
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./admin:/app
      - /app/node_modules

volumes:
  pgdata:
