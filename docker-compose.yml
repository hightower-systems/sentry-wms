
services:
  db:
    image: postgres:16
    container_name: sentry-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentry}
      POSTGRES_DB: ${POSTGRES_DB:-sentry}
      SKIP_SEED: ${SKIP_SEED:-false}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed-apartment-lab.sql:/seed-data/seed-apartment-lab.sql
      - ./db/seed.sh:/docker-entrypoint-initdb.d/02-seed.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: sentry-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env -- see .env.example}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_PORT: 5000
      # #136 / #107 follow-up: explicitly forward TRUST_PROXY into the
      # api container. Without this, setting TRUST_PROXY=true in .env is
      # cosmetic -- Compose does not auto-forward arbitrary host env vars.
      # Default false for direct-connect deployments; operator opts in by
      # setting TRUST_PROXY=true in .env when Sentry runs behind a TLS-
      # terminating reverse proxy. See docs/deployment.md.
      TRUST_PROXY: ${TRUST_PROXY:-false}
      # v1.5.1 V-206 (#147): forward API_BIND_HOST into the container
      # so the Flask boot guard can refuse the
      # "TRUST_PROXY=true + API_BIND_HOST=0.0.0.0" combination. Without
      # forwarding, the guard sees None and cannot detect the unsafe
      # shape. The value is informational inside the container; Docker
      # applies the bind at the host level.
      API_BIND_HOST: ${API_BIND_HOST:-127.0.0.1}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5000,http://localhost:8080,http://localhost:8081"
      SENTRY_ENCRYPTION_KEY: ${SENTRY_ENCRYPTION_KEY:?Set SENTRY_ENCRYPTION_KEY in .env -- see .env.example}
      # v1.5.0 #128: pepper for the X-WMS-Token SHA-256 hash. The app
      # fails to boot without it so a misconfigured deployment never
      # silently falls back to an empty pepper.
      SENTRY_TOKEN_PEPPER: ${SENTRY_TOKEN_PEPPER:?Set SENTRY_TOKEN_PEPPER in .env -- see .env.example}
      # The API enqueues Celery tasks (manual sync trigger, fulfillment
      # push) so it needs the authenticated broker URL too.
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
    ports:
      # V-040: bind to loopback by default so a misconfigured public-cloud
      # host does not expose the API to the internet. Deployments that
      # need external access should layer a reverse proxy (nginx, caddy,
      # cloud ALB) or override this in docker-compose.override.yml.
      # Dev laptops that need a phone / scanner on the same LAN to reach
      # the API directly can set API_BIND_HOST=0.0.0.0 in .env (#64).
      - "${API_BIND_HOST:-127.0.0.1}:5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./db:/db

  redis:
    image: redis:7-alpine
    container_name: sentry-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3

  snapshot-keeper:
    # v1.5.0 #132: holds REPEATABLE READ transactions that export a
    # pg_snapshot_id via pg_export_snapshot(). The API tier imports
    # the same snapshot on short-lived connections to page through
    # /api/v1/snapshot/inventory. Single-keeper architecture (plan
    # R12); horizontal scale is deferred. Restart policy is always-on
    # so a crash is quickly recovered and the 410 snapshot_expired
    # path is exercised for any in-flight scans.
    build: ./api
    container_name: sentry-snapshot-keeper
    command: python -m services.snapshot_keeper
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry}@db:5432/${POSTGRES_DB:-sentry}
      # v1.5.1 V-214 (#153): operators who run the least-privilege
      # role-creation SQL at db/role-snapshot-keeper.sql set
      # SNAPSHOT_KEEPER_DATABASE_URL in .env to point the keeper at
      # the dedicated sentry_keeper role (SELECT on integration_events,
      # SELECT/UPDATE/DELETE on snapshot_scans, EXECUTE on
      # pg_export_snapshot). Defaults to the forwarded DATABASE_URL
      # above when the dedicated var is unset so dev and single-role
      # deployments keep working unchanged.
      SNAPSHOT_KEEPER_DATABASE_URL: ${SNAPSHOT_KEEPER_DATABASE_URL:-}
      SNAPSHOT_KEEPER_HEARTBEAT_FILE: /tmp/snapshot-keeper-heartbeat
    volumes:
      - ./api:/app
    healthcheck:
      # Heartbeat written every 5s by the keeper. Mark unhealthy when
      # the file is older than 30s so a hung loop restarts the container.
      test: ["CMD-SHELL", "find /tmp/snapshot-keeper-heartbeat -newermt '-30 seconds' -print -quit | grep -q ."]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  celery-worker:
    build: ./api
    container_name: sentry-celery
    command: celery -A jobs worker --loglevel=info --pool=solo
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env -- see .env.example}
      SENTRY_ENCRYPTION_KEY: ${SENTRY_ENCRYPTION_KEY:?Set SENTRY_ENCRYPTION_KEY in .env -- see .env.example}
    volumes:
      - ./api:/app
      - ./db:/db

  admin:
    build: ./admin
    container_name: sentry-admin
    ports:
      # V-040: same rationale as the api service -- loopback only by default.
      # Warehouse deployments that need LAN access (e.g. tablets/scanners)
      # should override via docker-compose.override.yml or a compose profile,
      # or set ADMIN_BIND_HOST=0.0.0.0 in .env for LAN-dev convenience (#64).
      - "${ADMIN_BIND_HOST:-127.0.0.1}:8080:8080"
    depends_on:
      - api

volumes:
  pgdata:
