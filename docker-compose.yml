
services:
  db:
    image: postgres:16
    container_name: sentry-db
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: sentry
      POSTGRES_DB: sentry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed-apartment-lab.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: sentry-api
    environment:
      DATABASE_URL: postgresql://sentry:sentry@db:5432/sentry
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      FLASK_ENV: development
      FLASK_PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./db:/db

  admin:
    build: ./admin
    container_name: sentry-admin
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./admin:/app
      - /app/node_modules

volumes:
  pgdata:
