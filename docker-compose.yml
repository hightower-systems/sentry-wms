
services:
  db:
    image: postgres:16
    container_name: sentry-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentry}
      POSTGRES_DB: ${POSTGRES_DB:-sentry}
      SKIP_SEED: ${SKIP_SEED:-false}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed-apartment-lab.sql:/seed-data/seed-apartment-lab.sql
      - ./db/seed.sh:/docker-entrypoint-initdb.d/02-seed.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: sentry-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env -- see .env.example}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_PORT: 5000
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5000,http://localhost:8080,http://localhost:8081"
      SENTRY_ENCRYPTION_KEY: ${SENTRY_ENCRYPTION_KEY:?Set SENTRY_ENCRYPTION_KEY in .env -- see .env.example}
      # The API enqueues Celery tasks (manual sync trigger, fulfillment
      # push) so it needs the authenticated broker URL too.
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
    ports:
      # V-040: bind to loopback by default so a misconfigured public-cloud
      # host does not expose the API to the internet. Deployments that
      # need external access should layer a reverse proxy (nginx, caddy,
      # cloud ALB) or override this in docker-compose.override.yml.
      - "127.0.0.1:5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./db:/db

  redis:
    image: redis:7-alpine
    container_name: sentry-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery-worker:
    build: ./api
    container_name: sentry-celery
    command: celery -A jobs worker --loglevel=info --pool=solo
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env -- see .env.example}@redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentry}:${POSTGRES_PASSWORD:-sentry}@db:5432/${POSTGRES_DB:-sentry}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env -- see .env.example}
      SENTRY_ENCRYPTION_KEY: ${SENTRY_ENCRYPTION_KEY:?Set SENTRY_ENCRYPTION_KEY in .env -- see .env.example}
    volumes:
      - ./api:/app
      - ./db:/db

  admin:
    build: ./admin
    container_name: sentry-admin
    ports:
      # V-040: same rationale as the api service -- loopback only by default.
      # Warehouse deployments that need LAN access (e.g. tablets/scanners)
      # should override via docker-compose.override.yml or a compose profile.
      - "127.0.0.1:8080:8080"
    depends_on:
      - api

volumes:
  pgdata:
