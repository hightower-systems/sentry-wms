# ============================================================
# DEV-ONLY. DO NOT DEPLOY TO PRODUCTION.
# ============================================================
# v1.5.1 V-218 (umbrella #156): this nginx config pairs with
# docker-compose.proxied.yml and the mkcert-issued certs in
# proxy/certs/. server_name is a .local hostname (hosts-file
# resolution); the TLS chain does not validate against any
# public CA. Copying this file to a prod host produces
# certificate-rejection errors on every request.
#
# For production, use a real TLS terminator with a real cert
# (Let's Encrypt, cloud-managed cert, corporate PKI). See
# docs/deployment.md for the reverse-proxy guide.
# ============================================================

server {
    listen 443 ssl;
    server_name sentry.fruxh.local;

    ssl_certificate     /etc/nginx/certs/sentry.fruxh.local.pem;
    ssl_certificate_key /etc/nginx/certs/sentry.fruxh.local-key.pem;

    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://admin:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
